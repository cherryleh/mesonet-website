name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main  # Replace 'main' with your default branch if different.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18  # Ensures the correct version of Node.js is used.

    - name: Install dependencies
      run: npm ci  # Installs dependencies listed in package-lock.json.

    - name: Build Angular project
      run: npm run build -- --configuration production --base-href="/<repository-name>/" 
      # Replace <repository-name> with your actual repository name.

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist/<repository-name>  # Make sure this matches the folder generated by Angular build
